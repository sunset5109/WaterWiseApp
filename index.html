function calcETo(T,u,rh){
  var es=0.6108*Math.exp(17.27*T/(T+237.3));
  var ea=es*(rh/100);
  var vpd=Math.max(0,es-ea);
  return Math.max(0.5,0.408*(0.2*T+2)+0.66*(vpd/(1+0.34*u*0.278)));
}
function runMPC(th0,sk,ck,eto,rain){
  var s=SOILS[sk]||SOILS["Loam"],c=CROPS[ck]||CROPS["Corn"];
  var th=th0,out=[];
  for(var d=0;d<=7;d++){
    out.push(parseFloat(th.toFixed(4)));
    var drain=Math.max(0,(th-s.fc)*(s.ks/1000)*24);
    var ro=Math.max(0,th+rain/1000-s.sat);
    var rn=Math.max(0,rain/1000-ro);
    var thn=th-eto*c.kc/1000-drain+rn;
    var irr=thn<c.tgt-0.02?Math.min(c.tgt-thn,s.sat-th)*0.9:0;
    var noise=(Math.random()-0.5)*0.003*Math.exp(-0.487*d);
    th=Math.max(s.wp+0.01,Math.min(s.sat-0.02,thn+irr+noise));
  }
  return out;
}
function runThr(th0,sk,ck,eto,rain){
  var s=SOILS[sk]||SOILS["Loam"],c=CROPS[ck]||CROPS["Corn"];
  var th=th0,out=[];
  for(var d=0;d<=7;d++){
    out.push(parseFloat(th.toFixed(4)));
    var rn=Math.max(0,rain/1000-Math.max(0,th+rain/1000-s.sat));
    var irr=th<0.25?0.07:0;
    th=Math.max(s.wp,Math.min(s.sat-0.01,th-eto*c.kc/1000+rn+irr));
  }
  return out;
}
function getBands(mpc){
  return mpc.map(function(v,d){
    var h=Math.min(0.05,1.645*Math.sqrt(9e-6*(d+1)*1024));
    return{lo:Math.max(0.14,v-h),hi:Math.min(0.44,v+h)};
  });
}

function ForecastCanvas(props){
  var ref=useRef(null);
  useEffect(function(){
    var c=ref.current;
    if(!c||!props.mpc||!props.mpc.length)return;
    var dpr=window.devicePixelRatio||1;
    var W=c.offsetWidth||600,H=200;
    c.width=W*dpr;c.height=H*dpr;c.style.width=W+"px";c.style.height=H+"px";
    var ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    var pad={l:44,r:12,t:16,b:32};
    var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
    var yMin=0.10,yMax=0.46;
    function tx(d){return pad.l+cw*(d/(props.mpc.length-1));}
    function ty(v){return H-pad.b-ch*((v-yMin)/(yMax-yMin));}
    ctx.fillStyle="#fafafa";ctx.fillRect(0,0,W,H);
    var soil=SOILS[props.sk]||SOILS["Loam"];
    var crop=CROPS[props.ck]||CROPS["Corn"];
    [0.15,0.20,0.25,0.30,0.35,0.40].forEach(function(v){
      ctx.strokeStyle="#e5e7eb";ctx.lineWidth=0.8;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(pad.l,ty(v));ctx.lineTo(W-pad.r,ty(v));ctx.stroke();
      ctx.fillStyle="#9ca3af";ctx.font="9px Inter,sans-serif";ctx.textAlign="right";
      ctx.fillText(v.toFixed(2),pad.l-4,ty(v)+3);
    });
    for(var d=0;d<props.mpc.length;d++){
      ctx.fillStyle="#9ca3af";ctx.font="9px Inter,sans-serif";ctx.textAlign="center";
      ctx.fillText("D"+d,tx(d),H-pad.b+14);
    }
    ctx.strokeStyle="#86efac";ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.moveTo(pad.l,ty(crop.tgt));ctx.lineTo(W-pad.r,ty(crop.tgt));ctx.stroke();
    ctx.strokeStyle="#fca5a5";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,ty(soil.wp));ctx.lineTo(W-pad.r,ty(soil.wp));ctx.stroke();
    ctx.setLineDash([]);
    if(props.bands&&props.bands.length){
      ctx.fillStyle="rgba(16,185,129,0.10)";
      ctx.beginPath();
      props.bands.forEach(function(b,i){if(i===0)ctx.moveTo(tx(i),ty(b.hi));else ctx.lineTo(tx(i),ty(b.hi));});
      for(var i=props.bands.length-1;i>=0;i--)ctx.lineTo(tx(i),ty(props.bands[i].lo));
      ctx.closePath();ctx.fill();
    }
    if(props.thr&&props.thr.length){
      ctx.strokeStyle="#f87171";ctx.lineWidth=1.5;ctx.setLineDash([5,3]);
      ctx.beginPath();
      props.thr.forEach(function(v,i){if(i===0)ctx.moveTo(tx(i),ty(v));else ctx.lineTo(tx(i),ty(v));});
      ctx.stroke();ctx.setLineDash([]);
    }
    ctx.strokeStyle=GREEN;ctx.lineWidth=2.5;
    ctx.beginPath();
    props.mpc.forEach(function(v,i){if(i===0)ctx.moveTo(tx(i),ty(v));else ctx.lineTo(tx(i),ty(v));});
    ctx.stroke();
    props.mpc.forEach(function(v,i){
      ctx.beginPath();ctx.arc(tx(i),ty(v),3.5,0,Math.PI*2);
      ctx.fillStyle=GREEN;ctx.fill();
      ctx.strokeStyle="#fff";ctx.lineWidth=1.5;ctx.stroke();
    });
  },[props.mpc,props.thr,props.bands,props.sk,props.ck]);
  return <canvas ref={ref} style={{width:"100%",display:"block",borderRadius:"8px"}}/>;
}

function MiniGraph(props){
  var ref=useRef(null);
  useEffect(function(){
    var c=ref.current;
    if(!c||!props.data||!props.data.length)return;
    var dpr=window.devicePixelRatio||1,W=c.offsetWidth||120,H=props.h||32;
    c.width=W*dpr;c.height=H*dpr;c.style.width=W+"px";c.style.height=H+"px";
    var ctx=c.getContext("2d");ctx.scale(dpr,dpr);
    var mn=Math.min.apply(null,props.data)-0.005;
    var mx=Math.max.apply(null,props.data)+0.005;
    function tx(i){return(i/(props.data.length-1))*W;}
    function ty(v){return H-((v-mn)/(mx-mn))*(H-4)-2;}
    ctx.strokeStyle=props.color||GREEN;ctx.lineWidth=1.8;
    ctx.beginPath();
    props.data.forEach(function(v,i){if(i===0)ctx.moveTo(tx(i),ty(v));else ctx.lineTo(tx(i),ty(v));});
    ctx.stroke();
  },[props.data,props.color,props.h]);
  return <canvas ref={ref} style={{width:"100%",height:props.h||32,display:"block"}}/>;
}

// ── LANGUAGE SWITCHER ─────────────────────────────────────────────────────────
function LangSwitcher(props) {
  var _open = useState(false); var open = _open[0]; var setOpen = _open[1];
  var ref = useRef(null);
  var cur = LANGS[props.lang] || LANGS["en"];

  useEffect(function() {
    function handler(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handler);
    return function() { document.removeEventListener("mousedown", handler); };
  }, []);

  return (
    <div ref={ref} style={{position:"relative",display:"inline-block"}}>
      <button onClick={function(){setOpen(!open);}}
        style={{display:"flex",alignItems:"center",gap:"5px",background:props.solid?"#f0fdf4":"rgba(255,255,255,0.15)",
          border:props.solid?"1px solid "+BORDER:"1px solid rgba(255,255,255,0.25)",

          color:props.solid?GREEN:"#fff",cursor:"pointer",fontFamily:"inherit"}}>
        <span style={{fontSize:"15px"}}>{cur.flag}</span>
        <span>{cur.label}</span>
        <span style={{fontSize:"9px",opacity:"0.7"}}>{open?"▲":"▼"}</span>
      </button>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:"0",background:"#fff",border:"1px solid #e5e7eb",
          borderRadius:"10px",boxShadow:"0 8px 24px rgba(0,0,0,0.12)",minWidth:"160px",zIndex:"9999",overflow:"hidden"}}>
          {Object.keys(LANGS).map(function(lk){
            var l = LANGS[lk];
            return(
              <div key={lk} onClick={function(){props.onChange(lk);setOpen(false);}}
                style={{padding:"9px 14px",fontSize:"13px",cursor:"pointer",display:"flex",alignItems:"center",
                  gap:"8px",color:lk===props.lang?GREEN:"#374151",background:lk===props.lang?"#f0fdf4":"#fff",
                  fontWeight:lk===props.lang?"700":"400",fontFamily:"inherit"}}>

}

function AnalysisPage(props){
  var t = props.t;
  var _step=useState(1);var step=_step[0];var setStep=_step[1];
  var _reg=useState("Fresno, California");var reg=_reg[0];var setReg=_reg[1];
  var _sk=useState("Loam");var sk=_sk[0];var setSk=_sk[1];
  var _ck=useState("Corn");var ck=_ck[0];var setCk=_ck[1];
  var _temp=useState(22);var temp=_temp[0];var setTemp=_temp[1];
  var _rain=useState(70);var rain=_rain[0];var setRain=_rain[1];
  var _wind=useState(12);var wind=_wind[0];var setWind=_wind[1];
  var _rh=useState(65);var rh=_rh[0];var setRh=_rh[1];
  var _th=useState(0.22);var th=_th[0];var setTh=_th[1];
  var _ha=useState(10);var ha=_ha[0];var setHa=_ha[1];
  var _mpc=useState([]);var mpc=_mpc[0];var setMpc=_mpc[1];
  var _thr=useState([]);var thr=_thr[0];var setThr=_thr[1];
  var _bands=useState([]);var bands=_bands[0];var setBands=_bands[1];
  var _loading=useState(false);var loading=_loading[0];var setLoading=_loading[1];

  var rd=SITES.find(function(s){return s.name===reg;})||SITES[0];
  var soil=SOILS[sk]||SOILS["Loam"];
  var crop=CROPS[ck]||CROPS["Corn"];
  var eto=calcETo(temp,wind,rh);
  var deficit=Math.max(0,crop.tgt-th);
  var savPct=Math.max(5,Math.min(40,rd.s+(rain-80)/70-(temp-25)/12));
  var wSaved=Math.round(ha*rd.base*savPct/100);
  var cSaved=Math.round(wSaved*rd.cost);
  var irrStatus=th<soil.wp+0.02?"Critical — near wilting":th<crop.tgt-0.04?"Deficit — irrigate soon":th<crop.tgt?"Adequate":"Optimal";
  var irrColor=th<soil.wp+0.02?"#dc2626":th<crop.tgt-0.04?"#f97316":th<crop.tgt?"#0d9488":GREEN;

  function runForecast(){
    setLoading(true);
    setTimeout(function(){
      var e=calcETo(temp,wind,rh);
      var m=runMPC(th,sk,ck,e,rain);
      var tr=runThr(th,sk,ck,e,rain);
      setMpc(m);setThr(tr);setBands(getBands(m));
      setLoading(false);setStep(3);
    },900);
  }

  var inpStyle={width:"100%",padding:"10px 12px",border:"1px solid #e5e7eb",borderRadius:"8px",fontSize:"13px",background:"#fff",color:"#111827",outline:"none"};
  var STEPS=["Location & Crop","Conditions","Forecast","Impact"];

  return(
    <div>
      <InnerHero label={t.nav_analysis} title="Analyze Your Farm" sub="Step-by-step 7-day Neural MPC forecast with 90% confidence intervals."/>
      <div style={{maxWidth:"860px",margin:"0 auto",padding:"32px 40px 72px"}}>
        <div style={{display:"flex",alignItems:"center",marginBottom:"32px"}}>
          {STEPS.map(function(s,i){
            var active=step===i+1,done=step>i+1;
            return(
              <React.Fragment key={s}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"5px"}}>
                  <div style={{width:"32px",height:"32px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                    background:done?GREEN:active?"#064e3b":"#e5e7eb",
                    color:done||active?"#fff":"#9ca3af",fontWeight:"700",fontSize:"13px",cursor:done?"pointer":"default"}}
                    onClick={function(){if(done)setStep(i+1);}}>
                    {done?"✓":i+1}
                  </div>
                  <div style={{fontSize:"11px",fontWeight:"600",color:active?"#064e3b":done?GREEN:"#9ca3af",whiteSpace:"nowrap"}}>{s}</div>
                </div>
                {i<STEPS.length-1&&<div style={{flex:"1",height:"2px",background:done?GREEN:"#e5e7eb",margin:"0 6px",marginBottom:"18px"}}/>}
              </React.Fragment>
            );
          })}
        </div>

        {step===1&&(
          <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"28px"}}>
            <div style={{fontSize:"17px",fontWeight:"700",color:"#111827",marginBottom:"20px"}}>Where is your farm, and what are you growing?</div>
            <SelectRow label="Region" value={reg} onChange={setReg} options={SITES.map(function(s){return s.name;})}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
              <SelectRow label="Soil Type" value={sk} onChange={setSk} options={Object.keys(SOILS)}/>
              <SelectRow label="Crop" value={ck} onChange={setCk} options={Object.keys(CROPS)}/>
            </div>
            <div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:"12px",padding:"16px",marginBottom:"20px"}}>
              <div style={{fontSize:"12px",fontWeight:"700",color:"#065f46",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"10px"}}>Soil & Crop Profile</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:"8px"}}>
                {[["Wilting pt",soil.wp.toFixed(2)+" m³/m³"],["Field cap",soil.fc.toFixed(2)+" m³/m³"],["Saturation",soil.sat.toFixed(2)+" m³/m³"],["Crop target",crop.tgt.toFixed(2)+" m³/m³"],["Root depth",crop.rd.toFixed(1)+" m"]].map(function(item){
                  return(<div key={item[0]} style={{background:"#fff",borderRadius:"8px",padding:"10px",textAlign:"center"}}>
                    <div style={{fontSize:"9px",color:GRAY,textTransform:"uppercase",letterSpacing:"0.3px",marginBottom:"4px"}}>{item[0]}</div>
                    <div style={{fontSize:"13px",fontWeight:"700",color:GREEN,fontFamily:"monospace"}}>{item[1]}</div>
                  </div>);
                })}
              </div>
            </div>
            <div style={{marginBottom:"20px"}}>
              <div style={{fontSize:"11px",fontWeight:"600",color:GRAY,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"6px"}}>Farm Size (hectares)</div>
              <input type="number" value={ha} min="0.1" max="500000" onChange={function(e){setHa(Math.max(0.1,Number(e.target.value)));}} style={inpStyle}/>
            </div>
            <button onClick={function(){setStep(2);}} style={{width:"100%",padding:"14px",background:GREEN,color:"#fff",border:"none",borderRadius:"10px",fontWeight:"700",fontSize:"15px"}}>
              Next: Enter Conditions →
            </button>
          </div>
        )}

        {step===2&&(
          <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"28px"}}>
            <div style={{fontSize:"17px",fontWeight:"700",color:"#111827",marginBottom:"6px"}}>Current field conditions</div>
            <div style={{fontSize:"13px",color:GRAY,marginBottom:"22px"}}>Adjust sliders to match your farm right now.</div>
            <div style={{background:"#f0fdf4",border:"1px solid #a7f3d0",borderRadius:"12px",padding:"16px",marginBottom:"20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
                <div style={{fontSize:"13px",fontWeight:"700",color:"#065f46"}}>Soil Moisture Status</div>
                <div style={{fontSize:"13px",fontWeight:"800",color:irrColor}}>{irrStatus}</div>
              </div>
              <SliderRow label="Current Soil Moisture (m³/m³)" value={th} onChange={setTh} min={0.10} max={0.44} step={0.01} display={th.toFixed(2)}/>
              <div style={{display:"flex",gap:"4px",marginTop:"6px"}}>
                {[["Wilting",soil.wp,"#dc2626"],["Field cap",soil.fc,"#059669"],["Saturation",soil.sat,"#0d9488"]].map(function(m){
                  return(<div key={m[0]} style={{flex:"1",background:"#fff",border:"1px solid #d1fae5",borderRadius:"6px",padding:"5px",textAlign:"center"}}>
                    <div style={{fontSize:"9px",color:GRAY}}>{m[0]}</div>
                    <div style={{fontSize:"12px",fontWeight:"700",color:m[2],fontFamily:"monospace"}}>{m[1].toFixed(2)}</div>
                  </div>);
                })}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px",marginBottom:"16px"}}>
              <div>
                <SliderRow label="Temperature (°C)" value={temp} onChange={setTemp} min={-5} max={50} step={1} display={temp+"°C"}/>
                <SliderRow label="Rainfall (mm/month)" value={rain} onChange={setRain} min={0} max={400} step={5} display={rain+" mm"}/>
              </div>
              <div>
                <SliderRow label="Wind Speed (km/h)" value={wind} onChange={setWind} min={0} max={80} step={1} display={wind+" km/h"}/>
                <SliderRow label="Humidity (%)" value={rh} onChange={setRh} min={10} max={100} step={5} display={rh+"%"}/>
              </div>
            </div>
            <div style={{background:"#f9fafb",border:"1px solid #e5e7eb",borderRadius:"8px",padding:"12px",marginBottom:"20px",display:"flex",gap:"20px",flexWrap:"wrap"}}>
              <div><span style={{fontSize:"12px",color:GRAY}}>Reference ET₀: </span><strong style={{color:GREEN,fontFamily:"monospace",fontSize:"13px"}}>{eto.toFixed(2)} mm/day</strong></div>
              <div><span style={{fontSize:"12px",color:GRAY}}>Crop ET: </span><strong style={{color:GREEN,fontFamily:"monospace",fontSize:"13px"}}>{(eto*crop.kc).toFixed(2)} mm/day</strong></div>
              <div><span style={{fontSize:"12px",color:GRAY}}>Deficit: </span><strong style={{color:deficit>0?"#f97316":GREEN,fontFamily:"monospace",fontSize:"13px"}}>{deficit>0?deficit.toFixed(3)+" m³/m³":"None"}</strong></div>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={function(){setStep(1);}} style={{padding:"14px 20px",background:"#fff",color:GRAY,border:"1px solid #e5e7eb",borderRadius:"10px",fontWeight:"600",fontSize:"14px"}}>← Back</button>
              <button onClick={runForecast} disabled={loading} style={{flex:"1",padding:"14px",background:loading?"#6ee7b7":GREEN,color:"#fff",border:"none",borderRadius:"10px",fontWeight:"700",fontSize:"15px"}}>
                {loading?"Running Neural MPC…":"Run 7-Day Forecast →"}
              </button>
            </div>
          </div>
        )}

        {step===3&&(
          <div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"28px",marginBottom:"16px"}}>
              <div style={{fontSize:"17px",fontWeight:"700",color:"#111827",marginBottom:"4px"}}>7-Day FNO Soil Moisture Forecast</div>
              <div style={{fontSize:"12px",color:GRAY,marginBottom:"14px"}}>
                <span style={{color:GREEN,fontWeight:"700"}}>■ Neural MPC</span>{"  "}
                <span style={{color:"#f87171",fontWeight:"700"}}>── Threshold</span>{"  "}
                <span style={{color:"#6ee7b7",fontWeight:"700"}}>▒ 90% CI</span>
              </div>
              <ForecastCanvas mpc={mpc} thr={thr} bands={bands} sk={sk} ck={ck}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"10px",marginBottom:"16px"}}>
              <Stat val={th.toFixed(3)} label="Soil moisture" sub="m³/m³ now"/>
              <Stat val={deficit>0?"-"+deficit.toFixed(3):"0.000"} label="Deficit" sub="vs crop target"/>
              <Stat val={savPct.toFixed(1)+"%"} label="Predicted saving" sub="vs threshold ctrl"/>
              <Stat val={mpc.length?mpc[mpc.length-1].toFixed(3):"—"} label="Day 7 moisture" sub="Neural MPC"/>
            </div>
            <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"28px",marginBottom:"16px"}}>
              <div style={{fontSize:"14px",fontWeight:"700",color:"#111827",marginBottom:"14px"}}>Day-by-Day Comparison</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
                <thead>
                  <tr>{["Day","Neural MPC","Threshold","Diff","Status"].map(function(h){return<th key={h} style={{background:"#f0fdf4",color:"#374151",fontWeight:"700",padding:"8px 10px",textAlign:"left",fontSize:"11px",borderBottom:"1px solid #a7f3d0"}}>{h}</th>;})}</tr>
                </thead>
                <tbody>
                  {mpc.map(function(v,i){
                    var tv=thr[i]||0,diff=v-tv;
                    var st=v<soil.wp+0.01?"Wilting risk":v<crop.tgt-0.03?"Deficit":v<crop.tgt?"Low":"Optimal";
                    var stc=v<soil.wp+0.01?"#dc2626":v<crop.tgt-0.03?"#f97316":v<crop.tgt?"#0d9488":GREEN;
                    return(<tr key={i} style={{background:i%2===0?"#fafafa":"#fff"}}>
                      <td style={{padding:"8px 10px",color:"#374151",fontWeight:"600"}}>Day {i}</td>
                      <td style={{padding:"8px 10px",color:GREEN,fontWeight:"700",fontFamily:"monospace"}}>{v.toFixed(3)}</td>
                      <td style={{padding:"8px 10px",color:"#f87171",fontFamily:"monospace"}}>{tv.toFixed(3)}</td>
                      <td style={{padding:"8px 10px",fontFamily:"monospace",color:diff>0?"#059669":"#f97316"}}>{diff>0?"+":""}{diff.toFixed(3)}</td>
                      <td style={{padding:"8px 10px"}}><span style={{background:stc+"22",color:stc,borderRadius:"4px",padding:"2px 8px",fontSize:"11px",fontWeight:"700"}}>{st}</span></td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={function(){setStep(2);}} style={{padding:"13px 20px",background:"#fff",color:GRAY,border:"1px solid #e5e7eb",borderRadius:"10px",fontWeight:"600",fontSize:"14px"}}>← Adjust</button>
              <button onClick={function(){setStep(4);}} style={{flex:"1",padding:"13px",background:GREEN,color:"#fff",border:"none",borderRadius:"10px",fontWeight:"700",fontSize:"15px"}}>See Economic Impact →</button>
            </div>
          </div>
        )}

        {step===4&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px",marginBottom:"14px"}}>
              <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"24px"}}>
                <div style={{fontSize:"14px",fontWeight:"700",color:"#111827",marginBottom:"14px"}}>Annual Impact — {ha} ha</div>
                {[["Region",reg],["Crop",ck+" on "+sk],["Baseline water",(ha*rd.base).toLocaleString()+" m³/yr"],["Predicted saving",savPct.toFixed(1)+"%"],["Water saved",wSaved.toLocaleString()+" m³/yr"],["Cost saved","$"+cSaved.toLocaleString()+"/yr"],["Water price","$"+rd.cost+"/m³"]].map(function(row){
                  return(<div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f3f4f6",fontSize:"13px"}}>
                    <span style={{color:GRAY}}>{row[0]}</span>
                    <span style={{fontWeight:"700",color:GREEN}}>{row[1]}</span>
                  </div>);
                })}
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e7eb",borderRadius:"16px",padding:"24px"}}>
                <div style={{fontSize:"14px",fontWeight:"700",color:"#111827",marginBottom:"14px"}}>Scale-Up Impact</div>
                {[[10,"Smallholder"],[100,"Mid-size"],[10000,"Regional"],[500000,"National"]].map(function(item){
                  var sz=item[0],lbl=item[1];
                  var w=Math.round(sz*rd.base*savPct/100),c=Math.round(w*rd.cost);
                  return(<div key={sz} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}>
                    <div>
                      <div style={{fontSize:"13px",fontWeight:"600",color:"#374151"}}>{lbl}</div>
                      <div style={{fontSize:"11px",color:GRAY}}>{sz.toLocaleString()} ha</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:"11px",color:TEAL,fontWeight:"700"}}>{w>=1e6?(w/1e6).toFixed(1)+"M":w.toLocaleString()} m³/yr</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"16px",fontWeight:"700",color:GREEN}}>${c>=1e6?(c/1e6).toFixed(0)+"M":c.toLocaleString()}/yr</div>
                    </div>
                  </div>);
                })}
              </div>
            </div>
            <div style={{display:"flex",gap:"10px"}}>
              <button onClick={function(){setStep(3);}} style={{padding:"13px 20px",background:"#fff",color:GRAY,border:"1px solid #e5e7eb",borderRadius:"10px",fontWeight:"600",fontSize:"14px"}}>← Forecast</button>
              <button onClick={function(){setStep(1);setMpc([]);setThr([]);setBands([]);}} style={{flex:"1",padding:"13px",background:"#064e3b",color:"#fff",border:"none",borderRadius:"10px",fontWeight:"700",fontSize:"15px"}}>Start New Analysis</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── RESEARCH PAGE ─────────────────────────────────────────────────────────────
function ResearchPage(props){
  var _tab=useState("results");var tab=_tab[0];var setTab=_tab[1];
  var _mr=useState(0);var mr=_mr[0];var setMr=_mr[1];
  var TABS=[{id:"results",label:"Math Results"},{id:"experiment",label:"Experiment"},{id:"global",label:"Global Sites"}];
  var m=MR[mr];
  return(
    <div>
      <InnerHero label="Science Fair 2026" title="Research" sub="Mathematical results, hardware experiment, and global validation." tabs={TABS} activeTab={tab} onTab={setTab}/>
      <div style={{maxWidth:"1060px",margin:"0 auto",padding:"32px 40px 72px"}}>
        {tab==="results"&&(
          <div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"20px"}}>
              {MR.map(function(item,i){
                return(<button key={item.id} onClick={function(){setMr(i);}}
                  style={{background:mr===i?GREEN:"#fff",color:mr===i?"#fff":GRAY,border:"1px solid "+(mr===i?GREEN:"#e5e7eb"),borderRadius:"7px",padding:"5px 12px",fontSize:"12px",fontWeight:"700",fontFamily:"inherit"}}>{item.tag}</button>);
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"16px"}}>
              <Card title="">
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"64px",fontWeight:"700",color:"#6ee7b7",lineHeight:"1",marginBottom:"-8px"}}>{"0"+m.id}</div>
                <div style={{fontSize:"20px",fontWeight:"800",color:"#111827",marginBottom:"6px"}}>{m.title}</div>
                <Tag green>{m.badge}</Tag>
                <div style={{background:"#f0fdf4",border:"1px solid "+BORDER,borderLeft:"3px solid "+GREEN,borderRadius:"8px",padding:"14px",marginTop:"16px"}}>
                  <div style={{fontSize:"10px",color:GRAY,fontWeight:"700",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:"8px"}}>Theoretical Claim</div>
                  <KatexMath latex={m.latex}/>
                  <div style={{fontSize:"12px",color:GRAY,marginTop:"8px"}}>{m.note}</div>
                </div>
              </Card>
              <Card title="Numerical Findings">
                {m.rows.map(function(row){return(<div key={row[0]} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f3f4f6",fontSize:"13px"}}><span style={{color:GRAY}}>{row[0]}</span><span style={{fontWeight:"700",color:GREEN,fontFamily:"monospace"}}>{row[1]}</span></div>);})}
                <div style={{background:"#f0fdf4",border:"1px solid "+BORDER,borderRadius:"8px",padding:"12px",marginTop:"14px"}}>
                  <div style={{fontSize:"11px",fontWeight:"700",color:"#374151",marginBottom:"5px"}}>Interpretation</div>
                  <div style={{fontSize:"13px",color:GRAY,lineHeight:"1.7"}}>{m.insight}</div>
                </div>
              </Card>
            </div>
          </div>
        )}
        {tab==="experiment"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"20px"}}>
              {[["33.4%","Water saved"],["36%","Less irrigations"],["0","Wilting events"],["p<0.05","Significant"]].map(function(item){return<Stat key={item[1]} val={item[0]} label={item[1]}/>;}) }
            </div>
            <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#92400e",marginBottom:"16px"}}>Note: Sensors not live — showing recorded data from Feb 3–16, 2026 experiment.</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"16px"}}>
              {PLANTS.map(function(p,i){
                var col=p.mpc?GREEN:"#f97316";
                return(<div key={i} style={{background:"#fff",border:"1px solid "+(p.mpc?BORDER:"#fed7aa"),borderRadius:"12px",padding:"18px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"12px"}}>
                    <div>
                      <div style={{fontSize:"14px",fontWeight:"700",color:"#111827"}}>{p.name} — {p.group}</div>
                      <div style={{fontSize:"12px",color:col,fontWeight:"600",marginTop:"2px"}}>{p.mpc?"Neural MPC":"Threshold control"}</div>
                    </div>
                    <Tag green={p.mpc}>{p.group}</Tag>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"10px"}}>
                    <div><div style={{fontSize:"10px",color:GRAY}}>Final moisture</div><div style={{fontSize:"14px",fontWeight:"700"}}>{p.tf.toFixed(2)} m³/m³</div></div>
                    <div><div style={{fontSize:"10px",color:GRAY}}>Total water</div><div style={{fontSize:"14px",fontWeight:"700"}}>{p.water} mL</div></div>
                  </div>
                  <MiniGraph data={p.hist} color={col} h={32}/>
                  <div style={{fontSize:"10px",color:GRAY,marginTop:"3px"}}>14-day moisture history</div>
                </div>);
              })}
            </div>
            <Card title="Full Results Table">
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
                <thead><tr>{["Metric","Control","Neural MPC","Change"].map(function(h){return<th key={h} style={{background:"#f0fdf4",color:"#374151",fontWeight:"700",padding:"9px 10px",textAlign:"left",fontSize:"12px",borderBottom:"1px solid "+BORDER}}>{h}</th>;})}</tr></thead>
                <tbody>
                  {[["Total water","109.0 mL","72.6 mL","−33.4%"],["Irrigations","22","14","−36.4%"],["Time below optimal","18.2%","4.1%","−77.5%"],["Min moisture","0.18","0.20","+11.1%"],["Final height","23.1 cm","23.5 cm","+0.4 cm"],["Wilting events","0","0","Same"]].map(function(row){
                    return(<tr key={row[0]}>{[row[0],row[1],row[2]].map(function(v){return<td key={v} style={{padding:"9px 10px",borderBottom:"1px solid #f9fafb",color:"#374151"}}>{v}</td>;})}
                      <td style={{padding:"9px 10px",borderBottom:"1px solid #f9fafb",fontWeight:"700",color:GREEN}}>{row[3]}</td></tr>);
                  })}
                </tbody>
              </table>
            </Card>
          </div>
        )}
        {tab==="global"&&(
          <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:"16px"}}>
            <Card title="Water Savings by Site">
              {SITES.map(function(s){
                var col=s.s>25?GREEN:s.s>15?TEAL:"#f97316";

// ── LEARN PAGE ─────────────────────────────────────────────────────────────────
function LearnPage(){
  var _lesson=useState(null);var lesson=_lesson[0];var setLesson=_lesson[1];
  var LESSONS=[
    {id:1,title:"Why Smart Irrigation?",level:"Beginner",mins:4,body:"Agriculture uses 70% of all freshwater globally. Most farms irrigate on fixed schedules or react only when soil gets dry, wasting water when rain is coming.\n\nWaterWise predicts soil moisture 7 days ahead and plans accordingly. Like a weather forecast for your root zone.\n\nResult: 24–36% less water used, zero impact on yield, runs on $60 of hardware."},
    {id:2,title:"How Soil Water Works",level:"Beginner",mins:6,body:"Soil moisture (θ) is measured in m³ of water per m³ of soil. Three key thresholds:\n\n- Saturation (~0.45): All pores full. Runoff and root damage risk.\n- Field Capacity (~0.30): Ideal. Water held against gravity.\n- Wilting Point (~0.20): Plant cannot extract water. Permanent damage.\n\nWater movement follows the Richards equation:\n\n  ∂θ/∂t = ∇·[K(θ)·∇ψ] + S\n\nThis is nonlinear and expensive to solve, which is why WaterWise uses a neural network."},
    {id:3,title:"The Neural Prediction Model",level:"Intermediate",mins:8,body:"A Fourier Neural Operator (FNO) learns the mapping G: θ(x,0) → θ(x,t).\n\nSteps:\n1. Input soil moisture → Fast Fourier Transform\n2. Learned weights multiply top 12 frequency modes\n3. Inverse FFT back to spatial domain\n4. Add local linear bypass\n5. Repeat for 4 layers\n\nTrained on 9 years of NASA SMAP data (2015–2024).\nInference: ~3ms vs ~4 hours for numerical solver.\nValidated: slope −1.34 (theory −1.5), R²=0.927."},
    {id:4,title:"Handling Uncertainty",level:"Intermediate",mins:7,body:"Real soil is not uniform. WaterWise adds stochastic noise:\n\n  dθ = f(θ)dt + σ(x,θ)dW(t)\n\nWhere W(t) is Brownian motion and σ is a learned noise function.\n\nThis gives probabilistic forecasts: not just 'θ will be 0.28' but '0.28 ± 0.025 with 90% confidence.'\n\n500 Monte Carlo samples take ~1.5 seconds. KL = 0.047 validates the uncertainty structure."},
    {id:5,title:"The Irrigation Controller",level:"Advanced",mins:9,body:"Threshold control: irrigate when θ < 0.25. Simple but wasteful.\n\nModel Predictive Control (MPC): every 12 hours, solve:\n\n  min E[ Σ α·u² + β·(θ − θ*)² ]\n  subject to P(θ ≥ θ_crit) ≥ 0.95\n\n1. FNO gives 7-day forecast (500 Monte Carlo paths)\n2. MPC solves the optimization\n3. Only first command applied (receding horizon)\n4. Re-optimize next step\n\nResult: 36% fewer events, 33% less water, zero wilting events."}
  ];
  if(lesson!==null){
    var L=LESSONS[lesson];
    return(<div>
      <InnerHero label="Education" title={L.title} sub={L.level+" — "+L.mins+" min read"}/>
      <div style={{maxWidth:"680px",margin:"0 auto",padding:"32px 40px 72px"}}>
        <button onClick={function(){setLesson(null);}} style={{background:"none",color:GREEN,border:"1px solid "+BORDER,borderRadius:"8px",padding:"7px 16px",fontWeight:"600",fontSize:"13px",marginBottom:"20px",fontFamily:"inherit"}}>← Back to Lessons</button>
        <Card title=""><div style={{fontSize:"13px",color:"#374151",lineHeight:"2.1",whiteSpace:"pre-line",fontFamily:"monospace"}}>{L.body}</div></Card>
        <div style={{display:"flex",gap:"10px",marginTop:"16px"}}>
          {lesson>0&&<button onClick={function(){setLesson(lesson-1);}} style={{background:"none",color:GREEN,border:"1px solid "+BORDER,borderRadius:"8px",padding:"9px 18px",fontWeight:"700",fontSize:"14px",fontFamily:"inherit"}}>Previous</button>}
          {lesson<LESSONS.length-1&&<button onClick={function(){setLesson(lesson+1);}} style={{background:GREEN,color:"#fff",border:"none",borderRadius:"8px",padding:"9px 18px",fontWeight:"700",fontSize:"14px",fontFamily:"inherit"}}>Next Lesson</button>}
        </div>
      </div>
    </div>);
  }
  return(<div>
    <InnerHero label="Education" title="How WaterWise Works" sub="From soil physics to neural operators. No prior knowledge needed."/>
    <div style={{maxWidth:"1060px",margin:"0 auto",padding:"32px 40px 72px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
        {LESSONS.map(function(l,i){
          return(<div key={l.id} style={{background:"#fff",borderRadius:"12px",padding:"20px",border:"1px solid #e5e7eb",cursor:"pointer"}} onClick={function(){setLesson(i);}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"28px",fontWeight:"700",color:"#6ee7b7"}}>{"0"+l.id}</div>
              <div style={{display:"flex",gap:"6px"}}><Tag green>{l.mins+" min"}</Tag><Tag>{l.level}</Tag></div>
            </div>
            <div style={{fontSize:"15px",fontWeight:"700",color:"#111827",marginBottom:"6px"}}>{l.title}</div>
            <div style={{fontSize:"13px",color:GREEN,fontWeight:"600"}}>Read lesson →</div>
          </div>);
        })}
      </div>
    </div>
  </div>);
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App(){
  var _page=useState("home");var page=_page[0];var setPage=_page[1];
  var _authed=useState(false);var authed=_authed[0];var setAuthed=_authed[1];
  var _showAuth=useState(false);var showAuth=_showAuth[0];var setShowAuth=_showAuth[1];
  var _scrolled=useState(false);var scrolled=_scrolled[0];var setScrolled=_scrolled[1];
  var _lang=useState("en");var lang=_lang[0];var setLang=_lang[1];

  var t = T[lang] || T["en"];

  useEffect(function(){
    var handler=function(){setScrolled(window.scrollY>60);};
    window.addEventListener("scroll",handler,{passive:true});
    return function(){window.removeEventListener("scroll",handler);};
  },[]);

  function go(p){setPage(p);window.scrollTo({top:0,behavior:"smooth"});}
  function onAnalyze(){if(!authed){setShowAuth(true);}else{go("analysis");}}

  return(
    <div style={{minHeight:"100vh"}}>
      <NavBar page={page} go={go} authed={authed} scrolled={scrolled} t={t} lang={lang} setLang={setLang}
        showAuth={function(){setShowAuth(true);}}
        signOut={function(){setAuthed(false);go("home");}}/>
      {showAuth&&<ModalAuth t={t} onAuth={function(){setAuthed(true);setShowAuth(false);go("analysis");}} onClose={function(){setShowAuth(false);}}/>}
      {page==="home"&&<HomePage go={go} onAnalyze={onAnalyze} t={t}/>}
      {page==="analysis"&&<AnalysisPage t={t}/>}
      {page==="research"&&<ResearchPage t={t}/>}
      {page==="community"&&<CommunityPage/>}
      {page==="learn"&&<LearnPage/>}
      {page==="howto"&&<HowToPage t={t} onAnalyze={onAnalyze}/>}
      {page==="about"&&<AboutPage/>}
      {page==="impact"&&<ImpactPage/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
